name: Feature request
description: Suggest a clear improvement for Mod Update Checker.
title: "[Feature] "
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Please describe the need first, then the proposed solution.

  - type: textarea
    id: need
    attributes:
      label: What problem would this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: Explain the behavior you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Final check
      options:
        - label: I checked that this suggestion has not already been submitted.
          required: true
